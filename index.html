<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Avengers Final Health & Training Hub</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
:root{
 --glass:rgba(12,18,37,.72);
 --stroke:rgba(255,255,255,.12);
 --gold:#d6b56d;
 --gold2:#f7e7b0;
 --green:#22c55e;
 --text:#f4f7ff;
 --muted:#b6c0da;
 --bg-card:rgba(255,255,255,.05);
}
*{box-sizing:border-box}
body{
 margin:0;
 font-family:Inter,Arial,sans-serif;
 color:var(--text);
 background:linear-gradient(135deg,#02030a,#071024,#0c1022);
}
header{
 text-align:center;
 padding:28px 16px;
}
h1{
 margin:0;
 font-size:clamp(28px,5vw,56px);
 letter-spacing:3px;
 background:linear-gradient(90deg,#fff,#f7e7b0,#d6b56d);
 -webkit-background-clip:text;
 color:transparent;
}
main{
 max-width:1200px;
 margin:auto;
 padding:16px;
 display:grid;
 gap:20px;
}
.section{
 background:var(--glass);
 backdrop-filter:blur(18px);
 border:1px solid var(--stroke);
 border-radius:24px;
 padding:22px;
}
.card{
 background:var(--bg-card);
 border:1px solid rgba(255,255,255,.1);
 border-radius:20px;
 padding:18px;
}
button{
 border:none;
 border-radius:14px;
 padding:11px 16px;
 font-weight:700;
 cursor:pointer;
 background:linear-gradient(135deg,#d6b56d,#f4dfb0);
}
button.ghost{
 background:rgba(255,255,255,.08);
 color:white;
}
input{
 width:100%;
 padding:10px;
 border-radius:10px;
 border:1px solid rgba(255,255,255,.15);
 background:rgba(255,255,255,.06);
 color:white;
 margin:4px 0;
}
.fade{
 animation:fade .4s ease;
}
@keyframes fade{
 from{opacity:0;transform:translateY(10px)}
 to{opacity:1}
}
.progress{
 font-size:14px;
 color:var(--gold2);
 margin-top:6px;
}
</style>
</head>

<body>

<header>
<h1>Avengers Health & Training Hub</h1>
<p class="small">Elite Fitness · Training · Connect</p>
</header>

<main>

<!-- HEALTH INTELLIGENCE -->
<section class="section">
<h2>🧠 Health Intelligence – 30 Day Program</h2>
<div class="card">
<div class="grid">
<input id="age" placeholder="Age">
<input id="height" placeholder="Height (cm)">
<input id="weight" placeholder="Weight (kg)">
<input id="steps" placeholder="Daily Steps">
</div>
<button onclick="generateProgram()">Generate Program</button>
<div id="healthOut"></div>
</div>
</section>

<!-- TRAINING MODULE -->
<section class="section">
<h2>🏋️ Training Exercise Module</h2>
<div class="card fade" id="exerciseCard">
<h3 id="exTitle"></h3>
<ul id="exSteps"></ul>
<div class="progress" id="exProgress"></div>
<button onclick="nextExercise()">Next Exercise</button>
<button class="ghost" onclick="randomExercise()">Random Exercise</button>
</div>
</section>

<!-- CONNECT -->
<section class="section">
<h2>🔗 Connect</h2>
<div class="card">
<p>Connect with Bhavik Dedhia on LinkedIn</p>
<a href="https://www.linkedin.com/in/bhavikrdedhia" target="_blank">
<button style="background:#0a66c2;color:white">LinkedIn Connect</button>
</a>
</div>
</section>

</main>

<script>
const exercises=[
 {n:"Jumping Jacks",s:["Stand tall","Jump feet out","Raise arms","Repeat"]},
 {n:"Push Ups",s:["Plank position","Lower chest","Push up"]},
