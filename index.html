<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Digital Health Intelligence Platform</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:Poppins;
background:#f5f7fb;
}

header{
background:linear-gradient(120deg,#0f766e,#059669);
color:white;
padding:25px;
text-align:center;
font-size:28px;
font-weight:600;
}

.container{
max-width:1300px;
margin:auto;
padding:30px;
}

.section{
margin-bottom:35px;
}

.section h2{
margin-bottom:15px;
border-left:6px solid #059669;
padding-left:10px;
}

.card{
background:white;
border-radius:12px;
padding:25px;
box-shadow:0 4px 18px rgba(0,0,0,0.08);
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:18px;
}

label{
font-size:13px;
font-weight:500;
}

input,select{

padding:10px;
border-radius:6px;
border:1px solid #d8dde6;
width:100%;
margin-top:4px;

}

input:focus{
outline:none;
border-color:#059669;
}

button{

margin-top:25px;
background:#059669;
color:white;
padding:14px 25px;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;

}

button:hover{
background:#047857;
}

.dashboard{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:25px;
margin-top:25px;
}

.metricCard{

background:white;
border-radius:12px;
padding:20px;
text-align:center;
box-shadow:0 3px 12px rgba(0,0,0,0.07);

}

.metricCard h3{
margin:0;
font-size:18px;
}

.healthScore{

font-size:45px;
font-weight:700;
color:#059669;

}

.chartBox{
height:300px;
}

.report{

background:white;
padding:40px;
margin-top:40px;
border-radius:12px;

}

table{
width:100%;
border-collapse:collapse;
margin-top:15px;
}

th,td{
border:1px solid #e5e7eb;
padding:10px;
text-align:left;
}

th{
background:#f0fdf4;
}

.disclaimer{

margin-top:40px;
padding:20px;
background:#fef3c7;
border-left:6px solid #f59e0b;

}

</style>

</head>

<body>

<header>

Digital Health Intelligence Platform

</header>

<div class="container">

<div class="card">

<h2>Patient Health Assessment</h2>

<div class="grid">

<div>
<label>Full Name</label>
<input id="name">
</div>

<div>
<label>Age</label>
<input id="age" type="number">
</div>

<div>
<label>Gender</label>
<select id="gender">
<option>Male</option>
<option>Female</option>
</select>
</div>

<div>
<label>Height (cm)</label>
<input id="height">
</div>

<div>
<label>Weight (kg)</label>
<input id="weight">
</div>

<div>
<label>Waist (cm)</label>
<input id="waist">
</div>

<div>
<label>Hip (cm)</label>
<input id="hip">
</div>

<div>
<label>Systolic BP</label>
<input id="bpSys">
</div>

<div>
<label>Diastolic BP</label>
<input id="bpDia">
</div>

<div>
<label>Daily Steps</label>
<input id="steps">
</div>

<div>
<label>Exercise Days/Week</label>
<input id="exercise">
</div>

<div>
<label>Sleep Hours</label>
<input id="sleep">
</div>

<div>
<label>Stress Level (1-10)</label>
<input id="stress">
</div>

<div>
<label>Water Intake (Liters)</label>
<input id="water">
</div>

<div>
<label>Smoking Status</label>
<select id="smoking">
<option>Never</option>
<option>Former</option>
<option>Occasional</option>
<option>Daily</option>
</select>
</div>

<div>
<label>Alcohol Consumption</label>
<select id="alcohol">
<option>Never</option>
<option>Occasional</option>
<option>Moderate</option>
<option>High</option>
</select>
</div>

</div>

<button onclick="analyzeHealth()">Analyze Health</button>

</div>


<div id="dashboard" style="display:none">

<div class="dashboard">

<div class="metricCard">

<h3>Overall Health Score</h3>
<div class="healthScore" id="healthScore"></div>

</div>

<div class="metricCard chartBox">
<canvas id="bmiChart"></canvas>
</div>

<div class="metricCard chartBox">
<canvas id="lifestyleChart"></canvas>
</div>

<div class="metricCard chartBox">
<canvas id="riskChart"></canvas>
</div>

</div>

</div>


<div id="report" class="report" style="display:none"></div>

</div>


<script>

function analyzeHealth(){

let h=document.getElementById("height").value/100;
let w=document.getElementById("weight").value;
let waist=document.getElementById("waist").value;
let hip=document.getElementById("hip").value;

let steps=document.getElementById("steps").value;
let sleep=document.getElementById("sleep").value;
let stress=document.getElementById("stress").value;
let water=document.getElementById("water").value;

let bmi=w/(h*h);

let activityScore=Math.min(100,(steps/10000)*60);
let sleepScore=(sleep/8)*100;
let hydrationScore=(water/3)*100;
let stressScore=100-(stress*10);

let lifestyleScore=(activityScore+sleepScore+hydrationScore+stressScore)/4;

let healthScore=Math.round((lifestyleScore+(100-bmi))/2);

document.getElementById("dashboard").style.display="block";

document.getElementById("healthScore").innerHTML=healthScore;

createCharts(bmi,lifestyleScore);

generateReport(healthScore,bmi);

}

function createCharts(bmi,lifestyle){

new Chart(document.getElementById("bmiChart"),{

type:"doughnut",

data:{
labels:["BMI","Remaining"],
datasets:[{data:[bmi,40-bmi]}]
}

})

new Chart(document.getElementById("lifestyleChart"),{

type:"radar",

data:{
labels:["Activity","Sleep","Hydration","Stress"],
datasets:[{data:[70,80,60,65]}]
}

})

new Chart(document.getElementById("riskChart"),{

type:"bar",

data:{
labels:["Risk Index"],
datasets:[{data:[100-lifestyle]}]
}

})

}

function generateReport(score,bmi){

document.getElementById("report").style.display="block";

document.getElementById("report").innerHTML=

`<h1>Health Assessment Report</h1>

<h2>Health Score</h2>

<p><b>${score}/100</b></p>

<h2>Body Metrics</h2>

<table>

<tr><th>Metric</th><th>Value</th></tr>

<tr><td>BMI</td><td>${bmi.toFixed(2)}</td></tr>

</table>

<div class="disclaimer">

<b>Medical Disclaimer</b>

<p>

This report is a digitally generated health assessment created based on the information provided by the user and general wellness guidelines. It is intended for informational and educational purposes only and should not be considered medical advice, diagnosis, or treatment. Always consult a qualified physician or healthcare professional before making any health-related decisions.

</p>

</div>

`;

}

</script>

</body>

</html>
