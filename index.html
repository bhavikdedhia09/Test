<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Advanced Preventive Health Diagnostic Platform</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
padding:25px;
}

.container{
max-width:1000px;
margin:auto;
background:#1e293b;
padding:25px;
border-radius:10px;
}

h1{
text-align:center;
color:#38bdf8;
}

input,select{
width:100%;
padding:8px;
margin:5px 0;
border-radius:6px;
border:none;
}

button{
padding:10px;
margin-top:10px;
border:none;
border-radius:6px;
background:#38bdf8;
cursor:pointer;
}

.report{
margin-top:25px;
background:#020617;
padding:25px;
border-radius:10px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

td,th{
border:1px solid #334155;
padding:8px;
}

.section{
margin-top:25px;
}

.good{color:#4ade80}
.warn{color:#facc15}
.bad{color:#f87171}

</style>
</head>

<body>

<div class="container">

<h1>Preventive Health Assessment</h1>

<h2>Patient Profile</h2>

<input id="name" placeholder="Patient Name">
<input id="age" type="number" placeholder="Age">

<select id="gender">
<option>Male</option>
<option>Female</option>
</select>

<input id="height" type="number" placeholder="Height (cm)">
<input id="weight" type="number" placeholder="Weight (kg)">
<input id="waist" type="number" placeholder="Waist Circumference (cm)">
<input id="hr" type="number" placeholder="Resting Heart Rate (bpm)">
<input id="sleep" type="number" placeholder="Sleep Hours">

<select id="activity">
<option value="1.2">Sedentary</option>
<option value="1.375">Light Activity</option>
<option value="1.55">Moderate Activity</option>
<option value="1.725">Heavy Exercise</option>
</select>

<button onclick="generateReport()">Generate Health Report</button>
<button onclick="window.print()">Download PDF</button>

<div id="report" class="report"></div>

</div>

<script>

function classifyHeartRate(hr){

if(hr < 60) return "Athlete Level"
if(hr <= 70) return "Excellent"
if(hr <= 80) return "Good"
if(hr <= 90) return "Elevated Risk"

return "High Risk"

}

function generateReport(){

let name=document.getElementById("name").value
let age=parseFloat(document.getElementById("age").value)
let gender=document.getElementById("gender").value
let height=parseFloat(document.getElementById("height").value)
let weight=parseFloat(document.getElementById("weight").value)
let waist=parseFloat(document.getElementById("waist").value)
let hr=parseFloat(document.getElementById("hr").value)
let sleep=parseFloat(document.getElementById("sleep").value)
let activity=parseFloat(document.getElementById("activity").value)

let bmi=(weight/((height/100)*(height/100))).toFixed(1)

let bodyFat=(1.2*bmi + 0.23*age - 10.8*(gender=="Male"?1:0) - 5.4).toFixed(1)

let waistHeight=(waist/height).toFixed(2)

let bmr

if(gender=="Male"){
bmr=10*weight+6.25*height-5*age+5
}else{
bmr=10*weight+6.25*height-5*age-161
}

let calories=Math.round(bmr*activity)

let hydration=(weight*0.035).toFixed(2)

let maxHR=Math.round(208-(0.7*age))

let vo2=(15*(maxHR/hr)).toFixed(1)

let hrClass=classifyHeartRate(hr)

/* Cardiac Risk Index */

let cardiacRisk=0

if(bmi>25) cardiacRisk+=1
if(waist>94) cardiacRisk+=1
if(hr>80) cardiacRisk+=1
if(sleep<7) cardiacRisk+=1
if(activity<=1.2) cardiacRisk+=1

let cardiacRiskLevel="Low"

if(cardiacRisk==2) cardiacRiskLevel="Moderate"
if(cardiacRisk>=3) cardiacRiskLevel="High"

/* Disease Probability */

let diabetes=Math.round((bmi*2 + waist)/5)
let heart=Math.round((hr+bmi)/3)

/* Biological Age */

let bioAge=Math.round(age+(bmi-22)+(sleep<7?3:-2)+(hr>80?2:-1))

/* Health Score */

let healthScore=100

if(bmi>25) healthScore-=10
if(hr>80) healthScore-=10
if(sleep<7) healthScore-=10
if(activity<1.4) healthScore-=10
if(waist>100) healthScore-=10

/* Alerts */

let alerts=[]

if(cardiacRiskLevel=="High") alerts.push("⚠ Elevated cardiovascular risk detected")
if(sleep<6) alerts.push("⚠ Sleep deficiency detected")
if(bmi>27) alerts.push("⚠ Metabolic risk indicators present")

/* AI Insight */

let insight=""

if(healthScore>85){
insight="Your overall health indicators suggest strong cardiovascular and metabolic wellness."
}
else if(healthScore>70){
insight="Health indicators are generally good but improvements in physical activity and sleep consistency may further reduce long-term disease risk."
}
else{
insight="Several lifestyle indicators suggest increased health risk. Improving exercise, sleep, and weight management may significantly improve long-term health."
}

/* 30 Day Plan */

let plan=""

for(let i=1;i<=30;i++){

plan+="Day "+i+": "

if(i%5==0){
plan+="30 minutes cardio exercise<br>"
}
else if(i%3==0){
plan+="Drink 2.5L water<br>"
}
else{
plan+="Walk 7000 steps<br>"
}

}

document.getElementById("report").innerHTML=`

<h2>Preventive Health Diagnostic Report</h2>

<b>Patient:</b> ${name}<br>
<b>Age:</b> ${age}<br>
<b>Gender:</b> ${gender}<br>

<div class="section">

<h3>Executive Health Summary</h3>

Health Intelligence Score: <b>${healthScore}/100</b>

<p>${insight}</p>

</div>

<div class="section">

<h3>Body Composition Analysis</h3>

<table>

<tr>
<th>Parameter</th>
<th>Result</th>
<th>Reference Range</th>
</tr>

<tr>
<td>BMI</td>
<td>${bmi}</td>
<td>18.5 – 24.9</td>
</tr>

<tr>
<td>Body Fat</td>
<td>${bodyFat}%</td>
<td>10 – 20%</td>
</tr>

<tr>
<td>Waist Circumference</td>
<td>${waist} cm</td>
<td><94 cm</td>
</tr>

<tr>
<td>Waist Height Ratio</td>
<td>${waistHeight}</td>
<td><0.52</td>
</tr>

</table>

</div>

<div class="section">

<h3>Cardiovascular Health Evaluation</h3>

<table>

<tr>
<th>Indicator</th>
<th>Result</th>
</tr>

<tr>
<td>Resting Heart Rate</td>
<td>${hr} bpm (${hrClass})</td>
</tr>

<tr>
<td>Maximum Heart Rate</td>
<td>${maxHR} bpm</td>
</tr>

<tr>
<td>VO2 Max Estimate</td>
<td>${vo2}</td>
</tr>

<tr>
<td>Cardiac Risk Index</td>
<td>${cardiacRisk} (${cardiacRiskLevel})</td>
</tr>

</table>

</div>

<div class="section">

<h3>Metabolic Health</h3>

<table>

<tr>
<td>Basal Metabolic Rate</td>
<td>${Math.round(bmr)} kcal/day</td>
</tr>

<tr>
<td>Estimated Daily Calories</td>
<td>${calories} kcal/day</td>
</tr>

<tr>
<td>Hydration Need</td>
<td>${hydration} L/day</td>
</tr>

</table>

</div>

<div class="section">

<h3>Disease Probability Analysis</h3>

<table>

<tr>
<th>Condition</th>
<th>Probability</th>
</tr>

<tr>
<td>Type 2 Diabetes</td>
<td>${diabetes}%</td>
</tr>

<tr>
<td>Cardiovascular Disease</td>
<td>${heart}%</td>
</tr>

</table>

</div>

<div class="section">

<h3>Biological Age Assessment</h3>

Chronological Age: ${age} years<br>
Estimated Biological Age: ${bioAge} years

</div>

<div class="section">

<h3>Priority Health Alerts</h3>

${alerts.length>0 ? alerts.join("<br>") : "<span class='good'>No major alerts detected</span>"}

</div>

<div class="section">

<h3>30-Day Health Improvement Plan</h3>

${plan}

</div>

<div class="section">

<p style="font-size:12px">

This automated health assessment provides preventive wellness insights based on self-reported measurements.  
It should not replace consultation with qualified healthcare professionals.

</p>

</div>

`

}

</script>

</body>
</html>
