<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Clinical Wellness Health Analytics Platform</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
margin:0;
padding:30px;
}

h1{
text-align:center;
color:#38bdf8;
}

.container{
max-width:1000px;
margin:auto;
background:#1e293b;
padding:25px;
border-radius:10px;
}

input,select{
width:100%;
padding:8px;
margin:6px 0;
border-radius:6px;
border:none;
}

button{
padding:10px;
background:#38bdf8;
border:none;
border-radius:6px;
cursor:pointer;
margin-top:10px;
}

.report{
margin-top:20px;
background:#020617;
padding:20px;
border-radius:10px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

td,th{
border:1px solid #334155;
padding:8px;
text-align:center;
}

canvas{
background:white;
border-radius:10px;
margin-top:25px;
}

</style>
</head>

<body>

<h1>Clinical Wellness Analytics Platform</h1>

<div class="container">

<h2>Health Profile</h2>

<input id="name" placeholder="Name">

<input id="age" type="number" placeholder="Age">

<select id="gender">
<option>Male</option>
<option>Female</option>
</select>

<input id="height" type="number" placeholder="Height (cm)">
<input id="weight" type="number" placeholder="Weight (kg)">
<input id="waist" type="number" placeholder="Waist Circumference (cm)">
<input id="hr" type="number" placeholder="Resting Heart Rate">

<input id="sleep" type="number" placeholder="Sleep Hours">

<select id="activity">
<option value="1.2">Sedentary</option>
<option value="1.375">Light Activity</option>
<option value="1.55">Moderate Exercise</option>
<option value="1.725">Heavy Exercise</option>
</select>

<button onclick="generateReport()">Generate Clinical Report</button>

<div id="report" class="report"></div>

<canvas id="healthChart"></canvas>

</div>

<script>

function generateReport(){

let name=document.getElementById("name").value
let age=parseFloat(document.getElementById("age").value)
let gender=document.getElementById("gender").value
let height=parseFloat(document.getElementById("height").value)
let weight=parseFloat(document.getElementById("weight").value)
let waist=parseFloat(document.getElementById("waist").value)
let hr=parseFloat(document.getElementById("hr").value)
let sleep=parseFloat(document.getElementById("sleep").value)
let activity=parseFloat(document.getElementById("activity").value)

let bmi=(weight/((height/100)*(height/100))).toFixed(1)

let bmiStatus="Normal"
if(bmi<18.5) bmiStatus="Underweight"
if(bmi>=25) bmiStatus="Overweight"
if(bmi>=30) bmiStatus="Obese"

let bmr

if(gender=="Male"){
bmr=10*weight+6.25*height-5*age+5
}else{
bmr=10*weight+6.25*height-5*age-161
}

let calories=Math.round(bmr*activity)

let water=(weight*0.035).toFixed(2)

let maxHR=220-age
let fatBurn=Math.round(maxHR*0.6)
let cardio=Math.round(maxHR*0.75)
let peak=Math.round(maxHR*0.9)

let cardioScore=100-hr
let metabolicScore=100-Math.abs(22-bmi)*5
let sleepScore=sleep*12
let fitnessScore=activity*40
let obesityScore=waist>100?60:90

let healthScore=Math.round((cardioScore+metabolicScore+sleepScore+fitnessScore+obesityScore)/5)

let biologicalAge=Math.round(age+(bmi-22)+(sleep<7?3:-2)+(hr>80?2:-1))

let diabetesRisk=bmi>27? "Moderate":"Low"
let heartRisk=hr>85? "Elevated":"Normal"

document.getElementById("report").innerHTML=`

<h2>Clinical Health Diagnostic Report</h2>

<p><b>Name:</b> ${name}</p>
<p><b>Health Intelligence Score:</b> ${healthScore}/100</p>

<table>

<tr>
<th>Assessment</th>
<th>Result</th>
</tr>

<tr>
<td>BMI</td>
<td>${bmi} (${bmiStatus})</td>
</tr>

<tr>
<td>Basal Metabolic Rate</td>
<td>${Math.round(bmr)} kcal</td>
</tr>

<tr>
<td>Daily Calorie Needs</td>
<td>${calories} kcal</td>
</tr>

<tr>
<td>Hydration Requirement</td>
<td>${water} L/day</td>
</tr>

<tr>
<td>Biological Age</td>
<td>${biologicalAge}</td>
</tr>

<tr>
<td>Heart Rate Zones</td>
<td>
Fat Burn: ${fatBurn} bpm<br>
Cardio: ${cardio} bpm<br>
Peak: ${peak} bpm
</td>
</tr>

<tr>
<td>Diabetes Risk</td>
<td>${diabetesRisk}</td>
</tr>

<tr>
<td>Heart Risk</td>
<td>${heartRisk}</td>
</tr>

</table>

<h3>Clinical Recommendations</h3>

<ul>
<li>Maintain BMI between 18.5 and 24.9</li>
<li>Exercise at least 30 minutes daily</li>
<li>Drink ${water} liters of water daily</li>
<li>Maintain 7–8 hours of sleep</li>
</ul>

`

drawChart(cardioScore,metabolicScore,fitnessScore,sleepScore,obesityScore)

}

function drawChart(cardio,metabolism,fitness,sleep,obesity){

new Chart(document.getElementById("healthChart"),{

type:"radar",

data:{
labels:["Cardio","Metabolism","Fitness","Sleep","Weight Risk"],

datasets:[{
label:"Health Analytics",
data:[cardio,metabolism,fitness,sleep,obesity]
}]
},

options:{
scales:{
r:{
min:0,
max:100
}
}
}

})

}

</script>

</body>
</html>
