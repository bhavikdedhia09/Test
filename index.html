<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Health Intelligence Platform</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>

body{
font-family:Inter;
margin:0;
background:linear-gradient(135deg,#eef2ff,#f8fafc);
}

header{
background:linear-gradient(90deg,#1e3a8a,#2563eb);
color:white;
padding:28px;
text-align:center;
font-size:26px;
font-weight:700;
}

.container{
max-width:1200px;
margin:auto;
padding:35px;
}

.card{
background:white;
border-radius:12px;
padding:28px;
box-shadow:0 8px 28px rgba(0,0,0,0.08);
margin-bottom:30px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:18px;
}

.metricGrid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-top:25px;
}

.metric{
background:linear-gradient(135deg,#f1f5f9,#e0f2fe);
border-radius:10px;
padding:20px;
text-align:center;
}

.metricValue{
font-size:34px;
font-weight:700;
color:#1e3a8a;
}

.metricLabel{
font-size:14px;
color:#333;
}

label{
font-size:13px;
font-weight:600;
}

input,select{
padding:11px;
border-radius:7px;
border:1px solid #cbd5e1;
width:100%;
}

button{
margin-top:25px;
background:#2563eb;
color:white;
border:none;
padding:14px 24px;
border-radius:8px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#1d4ed8;
}

.sectionTitle{
font-size:22px;
font-weight:600;
margin-top:35px;
color:#1e3a8a;
}

.programDay{
background:#ecfdf5;
padding:12px;
margin:7px 0;
border-left:5px solid #10b981;
border-radius:6px;
}

.reportBox{
background:white;
border-radius:14px;
padding:35px;
box-shadow:0 12px 30px rgba(0,0,0,0.1);
}

</style>
</head>

<body>

<header>Digital Preventive Health Intelligence System</header>

<div class="container">

<div class="card">

<h2>Patient Health Assessment</h2>

<div class="grid">

<input id="name" placeholder="Full Name">
<input id="age" placeholder="Age">
<select id="gender">
<option value="">Gender</option>
<option>Male</option>
<option>Female</option>
</select>

<input id="height" placeholder="Height cm">
<input id="weight" placeholder="Weight kg">
<input id="restHR" placeholder="Resting Heart Rate">

<input id="steps" placeholder="Daily Steps">
<input id="sleep" placeholder="Sleep Hours">
<input id="stress" placeholder="Stress Level 1-10">

<input id="water" placeholder="Water Intake (Liters)">

<select id="smoking">
<option>No Smoking</option>
<option>Occasional</option>
<option>Daily</option>
</select>

<select id="alcohol">
<option>No Alcohol</option>
<option>Moderate</option>
<option>High</option>
</select>

</div>

<button onclick="analyzeHealth()">Analyze Health</button>

</div>

<div id="report" class="reportBox" style="display:none"></div>

</div>

<script>

function analyzeHealth(){

let name=document.getElementById("name").value
let age=document.getElementById("age").value
let height=document.getElementById("height").value
let weight=document.getElementById("weight").value
let restHR=document.getElementById("restHR").value

if(!name || !age || !height || !weight || !restHR){

alert("Please complete all assessment fields before analysis.")

return
}

let gender=document.getElementById("gender").value
let steps=document.getElementById("steps").value
let sleep=document.getElementById("sleep").value
let stress=document.getElementById("stress").value
let water=document.getElementById("water").value

height=height/100

let bmi=weight/(height*height)

let hrMax=220-age

let vo2=15.3*(hrMax/restHR)

let diabetesRisk=Math.round(bmi*0.8 + age*0.2)

let heartRisk=Math.round((bmi*0.6)+(stress*2))

let healthScore=Math.round(100-(diabetesRisk*0.3)-(heartRisk*0.3))

let plan=""

for(let i=1;i<=30;i++){

plan+=`<div class="programDay">Day ${i} – 30 minute walking + stretching routine</div>`

}

document.getElementById("report").style.display="block"

document.getElementById("report").innerHTML=`

<h1>Health Intelligence Report</h1>

<p><b>Patient:</b> ${name}</p>

<div class="metricGrid">

<div class="metric">
<div class="metricValue">${bmi.toFixed(1)}</div>
<div class="metricLabel">BMI</div>
</div>

<div class="metric">
<div class="metricValue">${vo2.toFixed(1)}</div>
<div class="metricLabel">VO₂ Max</div>
</div>

<div class="metric">
<div class="metricValue">${diabetesRisk}</div>
<div class="metricLabel">Diabetes Risk</div>
</div>

<div class="metric">
<div class="metricValue">${healthScore}</div>
<div class="metricLabel">Health Score</div>
</div>

</div>

<div class="sectionTitle">30 Day Fitness Program</div>

${plan}

<br><br>

<button onclick="downloadPDF()">Download Report</button>

<p style="margin-top:30px;font-size:12px">
Disclaimer: This digital health assessment is intended for wellness awareness only and should not replace consultation with a qualified medical professional.
</p>

`

}

async function downloadPDF(){

const {jsPDF}=window.jspdf

let report=document.getElementById("report")

html2canvas(report).then(canvas=>{

let img=canvas.toDataURL("image/png")

let pdf=new jsPDF("p","mm","a4")

pdf.addImage(img,"PNG",10,10,190,0)

pdf.save("Health_Report.pdf")

})

}

</script>

</body>
</html>
