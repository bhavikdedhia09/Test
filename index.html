<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Advanced Health AI Diagnostic Platform</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
padding:30px;
}

h1{
text-align:center;
color:#38bdf8;
}

.container{
max-width:950px;
margin:auto;
background:#1e293b;
padding:25px;
border-radius:10px;
}

input,select{
width:100%;
padding:8px;
margin:6px 0;
border-radius:6px;
border:none;
}

button{
padding:10px;
background:#38bdf8;
border:none;
border-radius:6px;
cursor:pointer;
margin-top:10px;
}

.report{
margin-top:25px;
background:#020617;
padding:25px;
border-radius:10px;
line-height:1.6;
}

.section{
margin-top:20px;
border-top:1px solid #334155;
padding-top:15px;
}

.alert{
color:#f87171;
}

.good{
color:#4ade80;
}

.warning{
color:#facc15;
}

</style>
</head>

<body>

<h1>Advanced Health AI Diagnostic Platform</h1>

<div class="container">

<h2>Health Profile</h2>

<input id="name" placeholder="Name">

<input id="age" type="number" placeholder="Age">

<select id="gender">
<option>Male</option>
<option>Female</option>
</select>

<input id="height" type="number" placeholder="Height (cm)">
<input id="weight" type="number" placeholder="Weight (kg)">
<input id="waist" type="number" placeholder="Waist Circumference (cm)">
<input id="hr" type="number" placeholder="Resting Heart Rate">

<input id="sleep" type="number" placeholder="Sleep Hours">

<select id="activity">
<option value="1.2">Sedentary</option>
<option value="1.375">Light Activity</option>
<option value="1.55">Moderate Exercise</option>
<option value="1.725">Heavy Exercise</option>
</select>

<button onclick="generateReport()">Generate AI Health Report</button>

<div id="report" class="report"></div>

</div>

<script>

function generateReport(){

let name=document.getElementById("name").value
let age=parseFloat(document.getElementById("age").value)
let gender=document.getElementById("gender").value
let height=parseFloat(document.getElementById("height").value)
let weight=parseFloat(document.getElementById("weight").value)
let waist=parseFloat(document.getElementById("waist").value)
let hr=parseFloat(document.getElementById("hr").value)
let sleep=parseFloat(document.getElementById("sleep").value)
let activity=parseFloat(document.getElementById("activity").value)

let bmi=(weight/((height/100)*(height/100))).toFixed(1)

let bmr

if(gender=="Male"){
bmr=10*weight+6.25*height-5*age+5
}else{
bmr=10*weight+6.25*height-5*age-161
}

let calories=Math.round(bmr*activity)

let hydration=(weight*0.035).toFixed(2)

let waistHeight=(waist/height).toFixed(2)

let bodyFat=(1.2*bmi + 0.23*age - 10.8*(gender=="Male"?1:0) - 5.4).toFixed(1)

let maxHR=220-age

let healthScore=100

if(bmi>25) healthScore-=10
if(hr>80) healthScore-=10
if(sleep<7) healthScore-=10
if(activity<1.4) healthScore-=10
if(waist>100) healthScore-=10

let diabetesProb=Math.round((bmi*2 + waist)/5)
let heartProb=Math.round((hr + bmi)/3)

let alerts=[]

if(bmi>27) alerts.push("Elevated metabolic risk")
if(hr>85) alerts.push("High resting heart rate")
if(sleep<6) alerts.push("Insufficient sleep recovery")

let bioAge=Math.round(age+(bmi-22)+(sleep<7?3:-2)+(hr>80?2:-1))

let insight=""

if(healthScore>85){
insight="Overall health indicators appear strong. Maintaining consistent exercise, nutrition, and sleep will support long-term cardiovascular and metabolic wellness."
}else if(healthScore>70){
insight="Your overall health profile is generally good, though improvements in lifestyle behaviors such as physical activity and sleep quality may further reduce disease risk."
}else{
insight="Multiple health indicators suggest moderate lifestyle risk. Increasing activity, improving sleep, and managing body weight may significantly improve long-term health outcomes."
}

let improvementPlan=""

for(let i=1;i<=30;i++){

improvementPlan+="Day "+i+": "

if(i%5==0){
improvementPlan+="30 minutes cardio exercise<br>"
}else if(i%3==0){
improvementPlan+="Drink 2.5L water<br>"
}else{
improvementPlan+="Walk 7000+ steps<br>"
}

}

document.getElementById("report").innerHTML=`

<h2>Comprehensive Health Diagnostic Report</h2>

<p><b>Name:</b> ${name}</p>

<p><b>Health Intelligence Score:</b> ${healthScore}/100</p>

<div class="section">

<h3>Body Composition Analysis</h3>

BMI: ${bmi}<br>
Body Fat Estimate: ${bodyFat}%<br>
Waist-Height Ratio: ${waistHeight}<br>

Interpretation:<br>
Healthy BMI typically ranges between 18.5 and 24.9. Waist-height ratios below 0.5 are associated with lower cardiovascular risk.

</div>

<div class="section">

<h3>Metabolic Health</h3>

Basal Metabolic Rate: ${Math.round(bmr)} kcal/day<br>
Estimated Daily Calorie Needs: ${calories} kcal/day<br>

Interpretation:<br>
BMR reflects the body's resting energy expenditure required for essential metabolic processes.

</div>

<div class="section">

<h3>Cardiovascular Health</h3>

Resting Heart Rate: ${hr} bpm<br>
Estimated Maximum Heart Rate: ${maxHR} bpm<br>

Interpretation:<br>
Resting heart rates between 60–80 bpm are generally associated with good cardiovascular conditioning.

</div>

<div class="section">

<h3>Disease Probability Analysis</h3>

Diabetes Probability: ${diabetesProb}%<br>
Heart Disease Probability: ${heartProb}%<br>

</div>

<div class="section">

<h3>Biological Age</h3>

Estimated Biological Age: ${bioAge}

</div>

<div class="section">

<h3>Priority Health Alerts</h3>

${alerts.length>0 ? alerts.join("<br>") : "<span class='good'>No major risk alerts detected</span>"}

</div>

<div class="section">

<h3>AI Health Insight</h3>

${insight}

</div>

<div class="section">

<h3>30-Day Health Improvement Plan</h3>

${improvementPlan}

</div>

<div class="section">

<p style="font-size:12px">

This automated health assessment is designed for educational
and wellness tracking purposes only and should not replace
professional medical consultation.

</p>

</div>

`

}

</script>

</body>
</html>
