<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Health Assessment Portal</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            line-height: 1.6;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            background: rgba(255, 255, 255, 0.95);
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        .header h1 {
            color: #2c3e50;
            font-size: 2.2em;
            margin-bottom: 10px;
        }

        .form-container {
            background: rgba(255, 255, 255, 0.95);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            margin-bottom: 30px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: #2c3e50;
        }

        .required {
            color: #e74c3c;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 30px;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin-top: 20px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .results-container {
            background: rgba(255, 255, 255, 0.95);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            margin-bottom: 30px;
            display: none;
        }

        .health-score {
            text-align: center;
            margin-bottom: 30px;
        }

        .score-circle {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2em;
            font-weight: bold;
            color: white;
        }

        .excellent { background: linear-gradient(135deg, #27ae60, #2ecc71); }
        .good { background: linear-gradient(135deg, #3498db, #2980b9); }
        .fair { background: linear-gradient(135deg, #f39c12, #e67e22); }
        .poor { background: linear-gradient(135deg, #e74c3c, #c0392b); }

        .report-section {
            margin-bottom: 25px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
            border-left: 5px solid #667eea;
        }

        .report-section h3 {
            color: #2c3e50;
            margin-bottom: 15px;
        }

        .challenges-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }

        .challenge-card {
            background: white;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.1);
            border-left: 4px solid #667eea;
        }

        .challenge-level {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 12px;
            font-size: 0.8em;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .basic { background: #d4edda; color: #155724; }
        .intermediate { background: #fff3cd; color: #856404; }
        .advanced { background: #f8d7da; color: #721c24; }

        .metric-card {
            background: white;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        .recommendations {
            list-style: none;
            padding: 0;
        }

        .recommendations li {
            padding: 8px 0;
            border-bottom: 1px solid #eee;
            position: relative;
            padding-left: 20px;
        }

        .recommendations li::before {
            content: "✓";
            position: absolute;
            left: 0;
            color: #27ae60;
            font-weight: bold;
        }

        .assessment-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }

        @media (max-width: 768px) {
            .container {
                padding: 10px;
            }
            
            .form-container,
            .results-container {
                padding: 15px;
            }
            
            .header h1 {
                font-size: 1.8em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏥 Health Assessment Portal</h1>
            <p>Quick Medical Analysis & Personalized Fitness Challenges</p>
        </div>

        <div class="form-container">
            <form id="healthForm">
                <div class="form-grid">
                    <!-- Essential Information Only -->
                    <div class="form-group">
                        <label for="personType">Person Type <span class="required">*</span></label>
                        <select id="personType" name="personType" required>
                            <option value="">Select Person Type</option>
                            <option value="athlete">Professional Athlete</option>
                            <option value="fitness-enthusiast">Fitness Enthusiast</option>
                            <option value="active-adult">Active Adult</option>
                            <option value="sedentary-adult">Sedentary Adult</option>
                            <option value="senior">Senior (65+)</option>
                            <option value="office-worker">Office Worker</option>
                            <option value="student">Student</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="age">Age <span class="required">*</span></label>
                        <input type="number" id="age" name="age" min="1" max="120" required>
                    </div>

                    <div class="form-group">
                        <label for="gender">Gender <span class="required">*</span></label>
                        <select id="gender" name="gender" required>
                            <option value="">Select Gender</option>
                            <option value="male">Male</option>
                            <option value="female">Female</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="height">Height (cm) <span class="required">*</span></label>
                        <input type="number" id="height" name="height" min="100" max="250" required>
                    </div>

                    <div class="form-group">
                        <label for="weight">Weight (kg) <span class="required">*</span></label>
                        <input type="number" id="weight" name="weight" min="30" max="200" required>
                    </div>

                    <div class="form-group">
                        <label for="activityLevel">Activity Level <span class="required">*</span></label>
                        <select id="activityLevel" name="activityLevel" required>
                            <option value="">Select Activity Level</option>
                            <option value="sedentary">Sedentary (little exercise)</option>
                            <option value="light">Light (1-3 days/week)</option>
                            <option value="moderate">Moderate (3-5 days/week)</option>
                            <option value="active">Very Active (6-7 days/week)</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="primaryGoal">Primary Goal <span class="required">*</span></label>
                        <select id="primaryGoal" name="primaryGoal" required>
                            <option value="">Select Primary Goal</option>
                            <option value="weight-loss">Weight Loss</option>
                            <option value="muscle-gain">Muscle Gain</option>
                            <option value="endurance">Improve Endurance</option>
                            <option value="strength">Increase Strength</option>
                            <option value="general-health">General Health</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="sleepHours">Sleep Hours/Night</label>
                        <input type="number" id="sleepHours" name="sleepHours" min="3" max="12" step="0.5" value="7">
                    </div>

                    <div class="form-group">
                        <label for="stressLevel">Stress Level (1-10)</label>
                        <input type="number" id="stressLevel" name="stressLevel" min="1" max="10" value="5">
                    </div>

                    <div class="form-group">
                        <label for="smokingStatus">Smoking Status</label>
                        <select id="smokingStatus" name="smokingStatus">
                            <option value="never">Never Smoked</option>
                            <option value="former">Former Smoker</option>
                            <option value="current">Current Smoker</option>
                        </select>
                    </div>
                </div>

                <button type="submit" class="btn">Generate Health Assessment Report</button>
            </form>
        </div>

        <div id="results" class="results-container">
            <!-- Results will be populated here -->
        </div>
    </div>

    <script>
        // Simplified Health Assessment System
        class HealthAssessment {
            constructor() {
                this.challenges = this.initializeChallenges();
            }

            initializeChallenges() {
                return {
                    basic: [
                        {
                            name: "Daily Walk Challenge",
                            description: "Walk 15 minutes daily for 7 days",
                            duration: "1 week",
                            difficulty: "Basic",
                            benefits: "Improves cardiovascular health and mood"
                        },
                        {
                            name: "Hydration Hero",
                            description: "Drink 8 glasses of water daily",
                            duration: "10 days",
                            difficulty: "Basic",
                            benefits: "Better energy and skin health"
                        },
                        {
                            name: "Posture Perfect",
                            description: "Practice good posture 5 minutes daily",
                            duration: "2 weeks",
                            difficulty: "Basic",
                            benefits: "Reduces back pain, improves confidence"
                        },
                        {
                            name: "Stretch & Flex",
                            description: "10 minutes of basic stretching daily",
                            duration: "2 weeks",
                            difficulty: "Basic",
                            benefits: "Improves flexibility and reduces tension"
                        },
                        {
                            name: "Sleep Schedule",
                            description: "Consistent bedtime for 10 days",
                            duration: "10 days",
                            difficulty: "Basic",
                            benefits: "Better sleep quality and energy"
                        }
                    ],
                    intermediate: [
                        {
                            name: "30-Day Push-up Progress",
                            description: "Build from 5 to 30 push-ups in 30 days",
                            duration: "30 days",
                            difficulty: "Intermediate",
                            benefits: "Upper body strength and endurance"
                        },
                        {
                            name: "Cardio Crusher",
                            description: "30 minutes cardio, 4 times per week",
                            duration: "4 weeks",
                            difficulty: "Intermediate",
                            benefits: "Cardiovascular health and weight loss"
                        },
                        {
                            name: "Strength Circuit",
                            description: "Full-body strength training 3x/week",
                            duration: "4 weeks",
                            difficulty: "Intermediate",
                            benefits: "Muscle strength and metabolism"
                        },
                        {
                            name: "HIIT Challenge",
                            description: "20-minute HIIT workouts 3x/week",
                            duration: "3 weeks",
                            difficulty: "Intermediate",
                            benefits: "Fat burning and fitness"
                        },
                        {
                            name: "Core Power",
                            description: "15-minute core workout daily",
                            duration: "21 days",
                            difficulty: "Intermediate",
                            benefits: "Core strength and posture"
                        }
                    ],
                    advanced: [
                        {
                            name: "Marathon Training",
                            description: "12-week marathon preparation",
                            duration: "12 weeks",
                            difficulty: "Advanced",
                            benefits: "Elite endurance and mental toughness"
                        },
                        {
                            name: "Powerlifting Protocol",
                            description: "Advanced strength with progressive overload",
                            duration: "8 weeks",
                            difficulty: "Advanced",
                            benefits: "Maximum strength and power"
                        },
                        {
                            name: "Athletic Performance",
                            description: "Sport-specific training program",
                            duration: "12 weeks",
                            difficulty: "Advanced",
                            benefits: "Peak athletic performance"
                        },
                        {
                            name: "Body Transformation",
                            description: "Complete physique transformation",
                            duration: "16 weeks",
                            difficulty: "Advanced",
                            benefits: "Dramatic body composition changes"
                        },
                        {
                            name: "Endurance Elite",
                            description: "Multi-sport endurance program",
                            duration: "10 weeks",
                            difficulty: "Advanced",
                            benefits: "Superior cardiovascular fitness"
                        }
                    ]
                };
            }

            calculateBMI(weight, height) {
                const heightInMeters = height / 100;
                return weight / (heightInMeters * heightInMeters);
            }

            assessBMI(bmi) {
                if (bmi < 18.5) return { category: 'underweight', risk: 'moderate', value: bmi };
                if (bmi < 25) return { category: 'normal', risk: 'low', value: bmi };
                if (bmi < 30) return { category: 'overweight', risk: 'moderate', value: bmi };
                return { category: 'obese', risk: 'high', value: bmi };
            }

            calculateHealthScore(formData, bmiAssessment) {
                let score = 100;
                let factors = [];

                // BMI Impact
                const bmiImpact = {
                    'normal': 0,
                    'underweight': -10,
                    'overweight': -15,
                    'obese': -25
                };
                score += bmiImpact[bmiAssessment.category] || -25;
                factors.push(`BMI: ${bmiAssessment.category}`);

                // Activity Level Impact
                const activityImpact = {
                    'sedentary': -20,
                    'light': -10,
                    'moderate': 0,
                    'active': 10
                };
                score += activityImpact[formData.activityLevel] || -20;
                factors.push(`Activity: ${formData.activityLevel}`);

                // Age Impact
                const age = parseInt(formData.age);
                if (age > 65) score -= 10;
                else if (age > 50) score -= 5;
                else if (age < 25) score += 5;

                // Lifestyle Factors
                if (formData.smokingStatus === 'current') {
                    score -= 25;
                    factors.push('Current smoker');
                }
                
                const sleepHours = parseFloat(formData.sleepHours) || 7;
                if (sleepHours < 6 || sleepHours > 9) {
                    score -= 10;
                    factors.push('Poor sleep duration');
                }

                const stressLevel = parseInt(formData.stressLevel) || 5;
                if (stressLevel > 7) {
                    score -= 15;
                    factors.push('High stress level');
                }

                return {
                    score: Math.max(0, Math.min(100, Math.round(score))),
                    factors: factors
                };
            }

            getHealthCategory(score) {
                if (score >= 85) return { category: 'excellent', color: 'excellent' };
                if (score >= 70) return { category: 'good', color: 'good' };
                if (score >= 50) return { category: 'fair', color: 'fair' };
                return { category: 'poor', color: 'poor' };
            }

            selectChallenges(formData, healthScore) {
                const selectedChallenges = [];
                
                // Determine challenge distribution based on health score
                let basicCount = 3, intermediateCount = 2, advancedCount = 1;
                
                if (healthScore.score < 50) {
                    basicCount = 4;
                    intermediateCount = 2;
                    advancedCount = 0;
                } else if (healthScore.score < 70) {
                    basicCount = 3;
                    intermediateCount = 3;
                    advancedCount = 1;
                } else {
                    basicCount = 2;
                    intermediateCount = 3;
                    advancedCount = 2;
                }

                // Add challenges
                selectedChallenges.push(...this.challenges.basic.slice(0, basicCount));
                selectedChallenges.push(...this.challenges.intermediate.slice(0, intermediateCount));
                selectedChallenges.push(...this.challenges.advanced.slice(0, advancedCount));

                return selectedChallenges;
            }

            generateRecommendations(formData, bmiAssessment, healthScore) {
                const recommendations = [];
                
                // BMI-based recommendations
                if (bmiAssessment.category === 'overweight' || bmiAssessment.category === 'obese') {
                    recommendations.push(
                        'Create a moderate caloric deficit (300-500 calories/day)',
                        'Combine cardiovascular and resistance training',
                        'Focus on whole foods and adequate protein intake'
                    );
                }

                // Activity level recommendations
                if (formData.activityLevel === 'sedentary') {
                    recommendations.push(
                        'Start with 15 minutes of daily walking',
                        'Gradually increase physical activity',
                        'Take stairs instead of elevators'
                    );
                }

                // Lifestyle recommendations
                if (formData.smokingStatus === 'current') {
                    recommendations.push(
                        'Consult healthcare provider about smoking cessation',
                        'Consider nicotine replacement therapy'
                    );
                }

                const sleepHours = parseFloat(formData.sleepHours) || 7;
                if (sleepHours < 7) {
                    recommendations.push(
                        'Aim for 7-9 hours of sleep nightly',
                        'Establish consistent sleep schedule'
                    );
                }

                const stressLevel = parseInt(formData.stressLevel) || 5;
                if (stressLevel > 6) {
                    recommendations.push(
                        'Practice stress-reduction techniques',
                        'Consider meditation or yoga'
                    );
                }

                // Goal-specific recommendations
                const goalRecs = {
                    'weight-loss': ['Focus on creating caloric deficit', 'Combine cardio with strength training'],
                    'muscle-gain': ['Increase protein intake', 'Focus on progressive resistance training'],
                    'endurance': ['Gradually increase cardio duration', 'Include interval training'],
                    'strength': ['Progressive overload in weight training', 'Allow adequate recovery time'],
                    'general-health': ['Maintain balanced exercise routine', 'Focus on consistency over intensity']
                };

                if (goalRecs[formData.primaryGoal]) {
                    recommendations.push(...goalRecs[formData.primaryGoal]);
                }

                return recommendations.slice(0, 10);
            }

            processAssessment(formData) {
                // Calculate BMI
                const bmi = this.calculateBMI(parseFloat(formData.weight), parseFloat(formData.height));
                const bmiAssessment = this.assessBMI(bmi);

                // Calculate health score
                const healthScore = this.calculateHealthScore(formData, bmiAssessment);
                const healthCategory = this.getHealthCategory(healthScore.score);

                // Generate content
                const challenges = this.selectChallenges(formData, healthScore);
                const recommendations = this.generateRecommendations(formData, bmiAssessment, healthScore);

                return {
                    bmiAssessment,
                    healthScore,
                    healthCategory,
                    challenges,
                    recommendations,
                    formData
                };
            }
        }

        // Initialize the system
        const healthAssessment = new HealthAssessment();

        // Form handling
        document.getElementById('healthForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            // Collect form data
            const formData = new FormData(this);
            const data = {};
            
            for (let [key, value] of formData.entries()) {
                data[key] = value;
            }

            console.log('Form data:', data); // Debug log

            // Process the assessment
            try {
                const results = healthAssessment.processAssessment(data);
                console.log('Results:', results); // Debug log
                displayResults(results);
            } catch (error) {
                console.error('Error processing assessment:', error);
                alert('Error generating report. Please check your inputs and try again.');
            }
        });

        function displayResults(results) {
            const resultsContainer = document.getElementById('results');
            const { bmiAssessment, healthScore, healthCategory, challenges, recommendations, formData } = results;

            const html = `
                <div class="health-score">
                    <div class="score-circle ${healthCategory.color}">
                        ${healthScore.score}
                    </div>
                    <h2>Health Score: ${healthCategory.category.toUpperCase()}</h2>
                    <p>Based on your health metrics and lifestyle factors</p>
                </div>

                <div class="report-section">
                    <h3>📊 Health Assessment Summary</h3>
                    <div class="assessment-grid">
                        <div class="metric-card">
                            <h4>BMI Analysis</h4>
                            <p><strong>${bmiAssessment.value.toFixed(1)}</strong></p>
                            <p>Category: ${bmiAssessment.category}</p>
                            <p>Risk Level: ${bmiAssessment.risk}</p>
                        </div>
                        <div class="metric-card">
                            <h4>Activity Level</h4>
                            <p><strong>${formData.activityLevel}</strong></p>
                            <p>Goal: ${formData.primaryGoal}</p>
                        </div>
                        <div class="metric-card">
                            <h4>Lifestyle Factors</h4>
                            <p>Sleep: ${formData.sleepHours || 7} hours</p>
                            <p>Stress: ${formData.stressLevel || 5}/10</p>
                            <p>Smoking: ${formData.smokingStatus}</p>
                        </div>
                    </div>
                </div>

                <div class="report-section">
                    <h3>🎯 Personalized Fitness Challenges</h3>
                    <p>Based on your profile as a <strong>${formData.personType}</strong> with goal of <strong>${formData.primaryGoal}</strong></p>
                    <div class="challenges-container">
                        ${challenges.map(challenge => `
                            <div class="challenge-card">
                                <span class="challenge-level ${challenge.difficulty.toLowerCase()}">${challenge.difficulty}</span>
                                <h4>${challenge.name}</h4>
                                <p><strong>Challenge:</strong> ${challenge.description}</p>
                                <p><strong>Duration:</strong> ${challenge.duration}</p>
                                <p><strong>Benefits:</strong> ${challenge.benefits}</p>
                            </div>
                        `).join('')}
                    </div>
                </div>

                <div class="report-section">
                    <h3>💡 Personalized Recommendations</h3>
                    <ul class="recommendations">
                        ${recommendations.map(rec => `<li>${rec}</li>`).join('')}
                    </ul>
                </div>

                <div class="report-section">
                    <h3>📈 Health Score Breakdown</h3>
                    <p>Your health score of <strong>${healthScore.score}/100</strong> was calculated based on:</p>
                    <ul class="recommendations">
                        ${healthScore.factors.map(factor => `<li>${factor}</li>`).join('')}
                    </ul>
                </div>

                <div class="report-section">
                    <h3>🔄 Next Steps</h3>
                    <ol class="recommendations">
                        <li>Start with Basic level challenges to build foundation</li>
                        <li>Consult healthcare provider before beginning new exercise programs</li>
                        <li>Track progress and reassess monthly</li>
                        <li>Focus on consistency rather than intensity initially</li>
                        <li>Gradually progress to more challenging levels</li>
                    </ol>
                </div>

                <div style="background: #e8f4fd; padding: 15px; border-radius: 8px; margin-top: 20px; text-align: center;">
                    <p><strong>Disclaimer:</strong> This assessment is for informational purposes only. Always consult healthcare providers before making significant health changes.</p>
                </div>
            `;

            resultsContainer.innerHTML = html;
            resultsContainer.style.display = 'block';
            resultsContainer.scrollIntoView({ behavior: 'smooth' });
        }
    </script>
</body>
</html>
