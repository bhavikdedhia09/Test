<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Health Assessment Portal - Professional Medical Analysis</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            background: rgba(255, 255, 255, 0.95);
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        .header h1 {
            color: #2c3e50;
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            color: #7f8c8d;
            font-size: 1.2em;
        }

        .form-container {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            margin-bottom: 30px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #2c3e50;
            font-size: 1.1em;
        }

        .required {
            color: #e74c3c;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .checkbox-group {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 10px;
            margin-top: 10px;
        }

        .checkbox-item {
            display: flex;
            align-items: center;
            padding: 8px;
            background: #f8f9fa;
            border-radius: 5px;
        }

        .checkbox-item input[type="checkbox"] {
            width: auto;
            margin-right: 10px;
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 30px;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
            margin-top: 20px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .results-container {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            margin-bottom: 30px;
            display: none;
        }

        .health-score {
            text-align: center;
            margin-bottom: 30px;
        }

        .score-circle {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5em;
            font-weight: bold;
            color: white;
        }

        .excellent { background: linear-gradient(135deg, #27ae60, #2ecc71); }
        .good { background: linear-gradient(135deg, #f39c12, #e67e22); }
        .fair { background: linear-gradient(135deg, #f39c12, #d35400); }
        .poor { background: linear-gradient(135deg, #e74c3c, #c0392b); }

        .report-section {
            margin-bottom: 30px;
            padding: 25px;
            background: #f8f9fa;
            border-radius: 10px;
            border-left: 5px solid #667eea;
        }

        .report-section h3 {
            color: #2c3e50;
            margin-bottom: 15px;
            font-size: 1.4em;
        }

        .challenges-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .challenge-card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            border-left: 5px solid #667eea;
        }

        .challenge-level {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 15px;
            font-size: 0.8em;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .basic { background: #d4edda; color: #155724; }
        .intermediate { background: #fff3cd; color: #856404; }
        .advanced { background: #f8d7da; color: #721c24; }

        .risk-factors {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
        }

        .risk-item {
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }

        .risk-low { background: #d4edda; color: #155724; }
        .risk-moderate { background: #fff3cd; color: #856404; }
        .risk-high { background: #f8d7da; color: #721c24; }

        .recommendations {
            list-style: none;
            padding: 0;
        }

        .recommendations li {
            padding: 10px 0;
            border-bottom: 1px solid #eee;
            position: relative;
            padding-left: 25px;
        }

        .recommendations li::before {
            content: "✓";
            position: absolute;
            left: 0;
            color: #27ae60;
            font-weight: bold;
        }

        @media (max-width: 768px) {
            .container {
                padding: 10px;
            }
            
            .form-container,
            .results-container {
                padding: 20px;
            }
            
            .header h1 {
                font-size: 2em;
            }
        }

        .error {
            color: #e74c3c;
            font-size: 0.9em;
            margin-top: 5px;
        }

        .progress-bar {
            width: 100%;
            height: 20px;
            background: #ecf0f1;
            border-radius: 10px;
            overflow: hidden;
            margin: 10px 0;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            transition: width 0.3s ease;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏥 Professional Health Assessment Portal</h1>
            <p>Comprehensive Medical Analysis & Personalized Fitness Challenges</p>
        </div>

        <div class="form-container">
            <form id="healthForm">
                <div class="form-grid">
                    <!-- Personal Information -->
                    <div class="form-section">
                        <h3 style="color: #2c3e50; margin-bottom: 20px;">Personal Information</h3>
                        
                        <div class="form-group">
                            <label for="personType">Person Type <span class="required">*</span></label>
                            <select id="personType" name="personType" required>
                                <option value="">Select Person Type</option>
                                <option value="athlete">Professional Athlete</option>
                                <option value="fitness-enthusiast">Fitness Enthusiast</option>
                                <option value="active-adult">Active Adult</option>
                                <option value="sedentary-adult">Sedentary Adult</option>
                                <option value="senior">Senior (65+)</option>
                                <option value="student">Student</option>
                                <option value="office-worker">Office Worker</option>
                                <option value="manual-laborer">Manual Laborer</option>
                                <option value="healthcare-worker">Healthcare Worker</option>
                                <option value="pregnant">Pregnant</option>
                                <option value="postpartum">Postpartum</option>
                                <option value="recovering">Recovering from Injury</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label for="age">Age <span class="required">*</span></label>
                            <input type="number" id="age" name="age" min="1" max="120" required>
                        </div>

                        <div class="form-group">
                            <label for="gender">Gender <span class="required">*</span></label>
                            <select id="gender" name="gender" required>
                                <option value="">Select Gender</option>
                                <option value="male">Male</option>
                                <option value="female">Female</option>
                                <option value="other">Other</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label for="height">Height (cm) <span class="required">*</span></label>
                            <input type="number" id="height" name="height" min="100" max="250" required>
                        </div>

                        <div class="form-group">
                            <label for="weight">Weight (kg) <span class="required">*</span></label>
                            <input type="number" id="weight" name="weight" min="30" max="300" step="0.1" required>
                        </div>
                    </div>

                    <!-- Health Metrics -->
                    <div class="form-section">
                        <h3 style="color: #2c3e50; margin-bottom: 20px;">Health Metrics</h3>
                        
                        <div class="form-group">
                            <label for="systolicBP">Systolic Blood Pressure (mmHg)</label>
                            <input type="number" id="systolicBP" name="systolicBP" min="70" max="250">
                        </div>

                        <div class="form-group">
                            <label for="diastolicBP">Diastolic Blood Pressure (mmHg)</label>
                            <input type="number" id="diastolicBP" name="diastolicBP" min="40" max="150">
                        </div>

                        <div class="form-group">
                            <label for="restingHR">Resting Heart Rate (bpm)</label>
                            <input type="number" id="restingHR" name="restingHR" min="30" max="150">
                        </div>

                        <div class="form-group">
                            <label for="bodyFat">Body Fat Percentage (%)</label>
                            <input type="number" id="bodyFat" name="bodyFat" min="3" max="60" step="0.1">
                        </div>

                        <div class="form-group">
                            <label for="waistCircumference">Waist Circumference (cm)</label>
                            <input type="number" id="waistCircumference" name="waistCircumference" min="50" max="200">
                        </div>
                    </div>

                    <!-- Lifestyle Factors -->
                    <div class="form-section">
                        <h3 style="color: #2c3e50; margin-bottom: 20px;">Lifestyle Assessment</h3>
                        
                        <div class="form-group">
                            <label for="activityLevel">Activity Level <span class="required">*</span></label>
                            <select id="activityLevel" name="activityLevel" required>
                                <option value="">Select Activity Level</option>
                                <option value="sedentary">Sedentary (little/no exercise)</option>
                                <option value="lightly-active">Lightly Active (1-3 days/week)</option>
                                <option value="moderately-active">Moderately Active (3-5 days/week)</option>
                                <option value="very-active">Very Active (6-7 days/week)</option>
                                <option value="extremely-active">Extremely Active (2x/day, intense)</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label for="sleepHours">Average Sleep Hours per Night</label>
                            <input type="number" id="sleepHours" name="sleepHours" min="3" max="12" step="0.5">
                        </div>

                        <div class="form-group">
                            <label for="stressLevel">Stress Level (1-10)</label>
                            <input type="number" id="stressLevel" name="stressLevel" min="1" max="10">
                        </div>

                        <div class="form-group">
                            <label for="smokingStatus">Smoking Status</label>
                            <select id="smokingStatus" name="smokingStatus">
                                <option value="never">Never Smoked</option>
                                <option value="former">Former Smoker</option>
                                <option value="current">Current Smoker</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label for="alcoholConsumption">Alcohol Consumption (drinks/week)</label>
                            <input type="number" id="alcoholConsumption" name="alcoholConsumption" min="0" max="50">
                        </div>
                    </div>

                    <!-- Medical History -->
                    <div class="form-section">
                        <h3 style="color: #2c3e50; margin-bottom: 20px;">Medical History</h3>
                        
                        <div class="form-group">
                            <label>Pre-existing Conditions:</label>
                            <div class="checkbox-group">
                                <div class="checkbox-item">
                                    <input type="checkbox" id="diabetes" name="conditions" value="diabetes">
                                    <label for="diabetes">Diabetes</label>
                                </div>
                                <div class="checkbox-item">
                                    <input type="checkbox" id="hypertension" name="conditions" value="hypertension">
                                    <label for="hypertension">Hypertension</label>
                                </div>
                                <div class="checkbox-item">
                                    <input type="checkbox" id="heart-disease" name="conditions" value="heart-disease">
                                    <label for="heart-disease">Heart Disease</label>
                                </div>
                                <div class="checkbox-item">
                                    <input type="checkbox" id="asthma" name="conditions" value="asthma">
                                    <label for="asthma">Asthma</label>
                                </div>
                                <div class="checkbox-item">
                                    <input type="checkbox" id="arthritis" name="conditions" value="arthritis">
                                    <label for="arthritis">Arthritis</label>
                                </div>
                                <div class="checkbox-item">
                                    <input type="checkbox" id="depression" name="conditions" value="depression">
                                    <label for="depression">Depression/Anxiety</label>
                                </div>
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="medications">Current Medications (optional)</label>
                            <textarea id="medications" name="medications" rows="3" placeholder="List any medications you're currently taking..."></textarea>
                        </div>

                        <div class="form-group">
                            <label for="injuries">Recent Injuries or Physical Limitations</label>
                            <textarea id="injuries" name="injuries" rows="3" placeholder="Describe any injuries or physical limitations..."></textarea>
                        </div>
                    </div>

                    <!-- Fitness Goals -->
                    <div class="form-section">
                        <h3 style="color: #2c3e50; margin-bottom: 20px;">Fitness Goals</h3>
                        
                        <div class="form-group">
                            <label for="primaryGoal">Primary Fitness Goal <span class="required">*</span></label>
                            <select id="primaryGoal" name="primaryGoal" required>
                                <option value="">Select Primary Goal</option>
                                <option value="weight-loss">Weight Loss</option>
                                <option value="muscle-gain">Muscle Gain</option>
                                <option value="endurance">Improve Endurance</option>
                                <option value="strength">Increase Strength</option>
                                <option value="flexibility">Improve Flexibility</option>
                                <option value="general-health">General Health</option>
                                <option value="sport-performance">Sport Performance</option>
                                <option value="rehabilitation">Rehabilitation</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label for="timeCommitment">Time Available for Exercise (hours/week)</label>
                            <input type="number" id="timeCommitment" name="timeCommitment" min="0" max="40" step="0.5">
                        </div>

                        <div class="form-group">
                            <label for="exercisePreference">Exercise Preference</label>
                            <select id="exercisePreference" name="exercisePreference">
                                <option value="gym">Gym/Weight Training</option>
                                <option value="cardio">Cardiovascular Exercise</option>
                                <option value="yoga">Yoga/Pilates</option>
                                <option value="sports">Sports Activities</option>
                                <option value="outdoor">Outdoor Activities</option>
                                <option value="home">Home Workouts</option>
                                <option value="mixed">Mixed/Variety</option>
                            </select>
                        </div>
                    </div>
                </div>

                <button type="submit" class="btn">Generate Comprehensive Health Assessment</button>
            </form>
        </div>

        <div id="results" class="results-container">
            <!-- Results will be populated here -->
        </div>
    </div>

    <script>
        // Comprehensive Health Assessment System
        class HealthAssessment {
            constructor() {
                this.fitnessStandards = this.initializeFitnessStandards();
                this.challenges = this.initializeChallenges();
                this.medicalKnowledge = this.initializeMedicalKnowledge();
            }

            initializeFitnessStandards() {

                        underweight: { min: 0, max: 18.5, risk: 'moderate' },

                        {

                        },
                        {
                            name: "Desk Exercise Dynamo",
                            description: "Perform desk exercises every 2 hours for 5 days",

                        {

                        {
