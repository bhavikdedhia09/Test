<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Health Intelligence SaaS v3</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:Inter;
background:#f4f7fb;
}

header{
background:linear-gradient(90deg,#0f172a,#1d4ed8);
color:white;
padding:22px;
text-align:center;
font-size:22px;
font-weight:700;
}

.container{
max-width:1200px;
margin:auto;
padding:25px;
}

.card{
background:white;
border-radius:12px;
padding:22px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
margin-bottom:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:12px;
}

input{
padding:10px;
border-radius:6px;
border:1px solid #cbd5e1;
}

button{
background:#1d4ed8;
color:white;
padding:12px 18px;
border:none;
border-radius:8px;
cursor:pointer;
margin-top:10px;
}

.metricGrid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
gap:15px;
margin-top:15px;
}

.metric{
background:#eef2ff;
padding:15px;
border-radius:10px;
text-align:center;
}

.metricValue{
font-size:24px;
font-weight:700;
color:#1e3a8a;
}

.sectionTitle{
margin-top:20px;
font-size:18px;
font-weight:600;
color:#0f172a;
}

.badge{
display:inline-block;
padding:6px 10px;
border-radius:6px;
font-size:12px;
font-weight:600;
}

.green{background:#dcfce7;color:#166534;}
.yellow{background:#fef9c3;color:#854d0e;}
.red{background:#fee2e2;color:#991b1b;}

.programDay{
background:#ecfdf5;
padding:8px;
margin:5px 0;
border-left:4px solid #10b981;
font-size:13px;
}

</style>
</head>

<body>

<header>Health Intelligence SaaS v3 (Preventive Clinical Engine)</header>

<div class="container">

<div class="card">

<h2>Patient Clinical Assessment</h2>

<div class="grid">

<input id="name" placeholder="Full Name">
<input id="age" placeholder="Age">
<input id="height" placeholder="Height (cm)">
<input id="weight" placeholder="Weight (kg)">
<input id="waist" placeholder="Waist (cm)">
<input id="steps" placeholder="Daily Steps">
<input id="sleep" placeholder="Sleep Hours">
<input id="stress" placeholder="Stress (1-10)">
<input id="water" placeholder="Water (L)">
<input id="hr" placeholder="Resting Heart Rate">

</div>

<button onclick="runAssessment()">Run Clinical Analysis</button>

</div>

<div id="report" class="card" style="display:none"></div>

</div>

<script>

function runAssessment(){

let name=document.getElementById("name").value
let age=+document.getElementById("age").value
let height=+document.getElementById("height").value/100
let weight=+document.getElementById("weight").value
let waist=+document.getElementById("waist").value
let steps=+document.getElementById("steps").value
let sleep=+document.getElementById("sleep").value
let stress=+document.getElementById("stress").value
let water=+document.getElementById("water").value
let hr=+document.getElementById("hr").value

if(!name||!age||!height||!weight){
alert("Fill required fields")
return
}

// BODY METRICS
let bmi = weight/(height*height)
let bodyFat = (1.2*bmi)+(0.23*age)-16.2
let fatMass = weight*(bodyFat/100)
let leanMass = weight-fatMass

// CARDIO + METABOLIC
let whtr = waist/(height*100)
let bmr = (10*weight)+(6.25*(height*100))-(5*age)+5
let tdee = bmr*1.4

// VO2 MAX
let vo2 = 15.3*(220-age)/hr

// METABOLIC AGE
let metabolicAge = age + ((bmi-22)*1.5)

// RISK ENGINE
let riskScore=0
if(bmi>25) riskScore++
if(bodyFat>25) riskScore++
if(steps<6000) riskScore++
if(sleep<6) riskScore++
if(stress>7) riskScore++
if(whtr>0.5) riskScore++

let risk="GREEN"
if(riskScore>3) risk="RED"
else if(riskScore>1) risk="YELLOW"

// 30 DAY PLAN
let base=[
"Brisk Walk",
"Mobility Training",
"Strength Workout",
"Core Stability",
"Cardio Session",
"Yoga Recovery",
"Meditation"
]

let program=""
for(let i=0;i<30;i++){
program+=`<div class="programDay">Day ${i+1}: ${base[i%7]}</div>`
}

// REPORT

document.getElementById("report").style.display="block"

document.getElementById("report").innerHTML=`

<h2>Executive Clinical Report - Health Intelligence</h2>

<span class="badge ${risk==='GREEN'?'green':risk==='YELLOW'?'yellow':'red'}">
Risk Level: ${risk}
</span>

<div class="sectionTitle">Body Composition</div>

<div class="metricGrid">

<div class="metric"><div class="metricValue">${bmi.toFixed(1)}</div>BMI</div>
<div class="metric"><div class="metricValue">${bodyFat.toFixed(1)}%</div>Body Fat</div>
<div class="metric"><div class="metricValue">${leanMass.toFixed(1)}</div>Lean Mass</div>
<div class="metric"><div class="metricValue">${fatMass.toFixed(1)}</div>Fat Mass</div>

</div>

<div class="sectionTitle">Metabolic & Fitness Health</div>

<div class="metricGrid">

<div class="metric"><div class="metricValue">${bmr.toFixed(0)}</div>BMR</div>
<div class="metric"><div class="metricValue">${tdee.toFixed(0)}</div>TDEE</div>
<div class="metric"><div class="metricValue">${vo2.toFixed(1)}</div>VO₂ Max</div>
<div class="metric"><div class="metricValue">${metabolicAge.toFixed(1)}</div>Metabolic Age</div>

</div>

<div class="sectionTitle">Clinical Interpretation</div>

<ul>
<li>Cardiometabolic Status: ${risk}</li>
<li>Fitness Level: ${vo2>40?"Good":"Needs Improvement"}</li>
<li>Body Composition: ${bmi<25?"Healthy":"Elevated Risk"}</li>
</ul>

<div class="sectionTitle">30-Day Health Intelligence Program</div>

${program}

<div class="sectionTitle">Clinical Note</div>

<p>
Health Intelligence uses evidence-based preventive health formulas to evaluate metabolic, cardiovascular,
and lifestyle health indicators. This system is designed for wellness optimization, not medical diagnosis.
</p>

`

}

</script>

</body>
</html>
