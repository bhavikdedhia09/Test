<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Avengers Final Working Hub</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
/* ================= Avengers THEME ================= */
:root{
--glass:rgba(12,18,37,.72);
--stroke:rgba(255,255,255,.12);
--gold:#d6b56d;
--gold2:#f7e7b0;
--text:#f4f7ff;
--muted:#b6c0da;
--bg-card:rgba(255,255,255,.05);
}
*{box-sizing:border-box}
body{
 margin:0;
 font-family:Inter,Arial,sans-serif;
 color:var(--text);
 background:linear-gradient(135deg,#02030a,#071024,#0c1022);
}
header{
 text-align:center;
 padding:28px;
}
h1{
 margin:0;
 font-size:clamp(28px,5vw,58px);
 background:linear-gradient(90deg,#fff,#f7e7b0,#d6b56d);
 -webkit-background-clip:text;
 color:transparent;
}
.small{color:var(--muted);font-size:13px}
main{
 max-width:1200px;
 margin:auto;
 padding:16px;
 display:grid;
 gap:18px;
}
.section{
 background:var(--glass);
 backdrop-filter:blur(18px);
 border:1px solid var(--stroke);
 border-radius:22px;
 padding:22px;
}
.section h2{
 background:linear-gradient(90deg,#fff,var(--gold2));
 -webkit-background-clip:text;
 color:transparent;
 margin-top:0;
}
.card{
 background:var(--bg-card);
 border:1px solid rgba(255,255,255,.1);
 border-radius:18px;
 padding:18px;
}
.grid{
 display:grid;
 gap:10px;
 grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
}
input{
 padding:10px;
 border-radius:10px;
 background:rgba(255,255,255,.06);
 border:1px solid rgba(255,255,255,.15);
 color:#fff;
}
button{
 padding:11px 16px;
 border:none;
 border-radius:14px;
 cursor:pointer;
 font-weight:700;
 background:linear-gradient(135deg,#d6b56d,#f4dfb0,#9f7d2e);
}

/* ================= REALISTIC SVG ANIMATIONS ================= */
.figure.jump { animation: jump 1s infinite ease-in-out; }
.figure.squat { animation: squat 1.2s infinite ease-in-out; }
.figure.push { animation: push 1.2s infinite ease-in-out; }

@keyframes jump {
 0%,100%{transform:translateY(0)}
 50%{transform:translateY(-28px)}
}
@keyframes squat {
 0%,100%{transform:scaleY(1)}
 50%{transform:scaleY(0.8)}
}
@keyframes push {
 0%,100%{transform:translateX(0)}
 50%{transform:translateX(14px)}
}
</style>
</head>

<body>

<header>
<p class="small">Avengers Premium Collection</p>
<h1>Avengers Final Working Hub</h1>
<p class="small">Health Intelligence · Training</p>
</header>

<main>

<!-- ================= HEALTH INTELLIGENCE (100% AS-IS) ================= -->
<section class="section">
<h2>🧠 Health Intelligence</h2>

<div class="card">
<div class="grid">
<input id="name" placeholder="Full Name">
<input id="age" placeholder="Age">
<input id="height" placeholder="Height (cm)">
<input id="weight" placeholder="Weight (kg)">
<input id="waist" placeholder="Waist (cm)">
<input id="steps" placeholder="Daily Steps">
<input id="sleep" placeholder="Sleep Hours">
<input id="stress" placeholder="Stress (1-10)">
<input id="hr" placeholder="Resting Heart Rate">
</div>
<button onclick="generateProgram()">Generate 30‑Day Program</button>
</div>

<div id="output" class="card" style="display:none"></div>
</section>

<!-- ================= TRAINING (REALISTIC) ================= -->
<section class="section">
<h2>🏋️ Training Exercises</h2>

<div class="card">
<div id="figure" class="figure jump" style="width:120px;margin:auto;">
<img src="https://upload.wikimedia.org/wikipedia/commons/3/3a/Human_silhouette.svg" width="120">
</div>

<h3 id="exName"></h3>
<ul id="exSteps"></ul>
<p class="small" id="exProgress"></p>

<button onclick="nextExercise()">Next Exercise</button>
</div>
</section>

<!-- ================= LINKEDIN ONLY ================= -->
<section class="section">
<h2>🔗 LinkedIn</h2>
<div class="card" style="text-align:center">
<a href="https://www.linkedin.com/in/bhavikrdedhia" target="_blank">
<button style="background:#0a66c2;color:#fff;font-size:16px">
Connect on LinkedIn
</button>
</a>
</div>
</section>

</main>

<script>
/* ===== ORIGINAL index.html LOGIC (FULL) ===== */
function generateProgram(){
 let age=+age.value;
 let h=+height.value/100;
 let w=+weight.value;
 let hrv=+hr.value;
 if(!age||!h||!w){alert("Fill required fields");return;}

 let bmi=w/(h*h);
 let bodyFat=(1.2*bmi)+(0.23*age)-16.2;
 let bmr=(10*w)+(6.25*(h*100))-(5*age)+5;
 let vo2=15*(220-age)/hrv;

 const program=[
"🔥 Day 1: Power Walk Activation",
"🧠 Day 2: Mental Reset",
"💪 Day 3: Strength Foundation",
"⚡ Day 4: HIIT Training",
"🧘 Day 5: Recovery Flow",
"🏃 Day 6: Endurance Walk",
"💧 Day 7: Active Recovery",
"🔥 Day 8–30: Progressive Fitness Cycles"
];

 let html=`<h3>30‑Day Program</h3>
 BMI: ${bmi.toFixed(1)}<br>
 Body Fat: ${bodyFat.toFixed(1)}%<br>
 BMR: ${bmr.toFixed(0)}<br>
 VO₂ Max: ${vo2.toFixed(1)}<br><br>`;

 program.forEach(p=>html+=p+"<br>");
 output.style.display="block";
 output.innerHTML=html;
}

/* ===== EXERCISES ===== */
const exercises=[
 {n:"Jumping Jacks",t:"jump",s:["Jump feet out","Raise arms","Soft landing"]},
 {n:"Bodyweight Squats",t:"squat",s:["Lower hips","Push heels","Stand tall"]},
 {n:"Push Ups",t:"push",s:["Lower chest","Engage core","Push up"]},
 {n:"Plank Hold",t:"",s:["Brace core","Hold position"]}
];
while(exercises.length<30){
 exercises.push({...exercises[exercises.length%4]});
}
let i=0;
function show(){
 let e=exercises[i];
 exName.textContent=e.n;
 exSteps.innerHTML=e.s.map(x=>"<li>"+x+"</li>").join("");
 exProgress.textContent=`${i+1} / 30`;
 figure.className="figure "+e.t;
}
function nextExercise(){i=(i+1)%30;show();}
show();
</script>

</body>
</html>
