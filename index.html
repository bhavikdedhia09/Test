<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Digital Health Intelligence Platform</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>

body{
margin:0;
font-family:Poppins;
background:#f4f7fb;
}

header{
background:linear-gradient(120deg,#059669,#047857);
color:white;
padding:25px;
text-align:center;
font-size:28px;
font-weight:600;
}

.container{
max-width:1200px;
margin:auto;
padding:30px;
}

.card{
background:white;
padding:25px;
border-radius:12px;
box-shadow:0 4px 15px rgba(0,0,0,0.08);
margin-bottom:25px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:18px;
}

label{
font-size:13px;
font-weight:500;
}

input,select{
padding:10px;
border-radius:6px;
border:1px solid #d1d5db;
width:100%;
margin-top:5px;
}

button{
margin-top:25px;
background:#059669;
color:white;
padding:14px 25px;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#047857;
}

.report{
background:white;
padding:40px;
border-radius:12px;
margin-top:30px;
}

.scoreBox{
font-size:40px;
font-weight:700;
color:#059669;
}

.section{
margin-top:30px;
}

.programDay{
padding:10px;
margin:6px 0;
border-left:5px solid #059669;
background:#ecfdf5;
}

.disclaimer{
margin-top:40px;
background:#fef3c7;
padding:20px;
border-left:6px solid #f59e0b;
}

</style>

</head>

<body>

<header>
Digital Health Intelligence Platform
</header>

<div class="container">

<div class="card">

<h2>Patient Health Assessment</h2>

<div class="grid">

<div>
<label>Full Name</label>
<input id="name">
</div>

<div>
<label>Age</label>
<input id="age" type="number">
</div>

<div>
<label>Height (cm)</label>
<input id="height">
</div>

<div>
<label>Weight (kg)</label>
<input id="weight">
</div>

<div>
<label>Waist (cm)</label>
<input id="waist">
</div>

<div>
<label>Daily Steps</label>
<input id="steps">
</div>

<div>
<label>Exercise Days/Week</label>
<input id="exercise">
</div>

<div>
<label>Sleep Hours</label>
<input id="sleep">
</div>

<div>
<label>Stress Level (1-10)</label>
<input id="stress">
</div>

<div>
<label>Water Intake (Liters)</label>
<input id="water">
</div>

<div>
<label>Smoking Status</label>
<select id="smoking">
<option>Never</option>
<option>Former</option>
<option>Occasional</option>
<option>Daily</option>
</select>
</div>

<div>
<label>Alcohol Consumption</label>
<select id="alcohol">
<option>Never</option>
<option>Occasional</option>
<option>Moderate</option>
<option>High</option>
</select>
</div>

</div>

<button onclick="analyzeHealth()">Analyze Health</button>

</div>

<div id="report" class="report" style="display:none"></div>

</div>

<script>

function analyzeHealth(){

let h=document.getElementById("height").value/100;
let w=document.getElementById("weight").value;
let steps=document.getElementById("steps").value;
let sleep=document.getElementById("sleep").value;
let stress=document.getElementById("stress").value;
let water=document.getElementById("water").value;
let smoking=document.getElementById("smoking").value;
let alcohol=document.getElementById("alcohol").value;

let bmi=w/(h*h);

let activityScore=Math.min(100,(steps/10000)*60);
let sleepScore=(sleep/8)*100;
let hydrationScore=(water/3)*100;
let stressScore=100-(stress*10);

let lifestyleScore=(activityScore+sleepScore+hydrationScore+stressScore)/4;

let cardioRisk=0;

if(bmi>30) cardioRisk+=20;
if(smoking=="Daily") cardioRisk+=20;
if(alcohol=="High") cardioRisk+=15;
if(stress>7) cardioRisk+=15;
if(steps<5000) cardioRisk+=15;

let healthScore=Math.round((lifestyleScore+(100-cardioRisk))/2);

let status="";

if(healthScore>=90) status="Excellent Health";
else if(healthScore>=75) status="Good Health";
else if(healthScore>=60) status="Moderate Health";
else if(healthScore>=40) status="Needs Improvement";
else status="High Health Risk";

generateReport(healthScore,status,bmi,cardioRisk);

}


function generateReport(score,status,bmi,cardioRisk){

let cardioChance="";

if(cardioRisk<20) cardioChance="Low Cardiovascular Risk";
else if(cardioRisk<40) cardioChance="Moderate Cardiovascular Risk";
else cardioChance="High Cardiovascular Risk";

let recommendations=[];

if(score<70)
recommendations.push("Increase daily physical activity and structured exercise.");

if(bmi>25)
recommendations.push("Adopt weight management through balanced nutrition.");

recommendations.push("Maintain hydration of 2–3 liters daily.");
recommendations.push("Sleep 7-8 hours per night.");
recommendations.push("Practice meditation or stress management.");

let fitnessPlan=generate30DayProgram(score);

document.getElementById("report").style.display="block";

document.getElementById("report").innerHTML=

`<h1>Personalized Health Report</h1>

<h2>Overall Health Score</h2>

<div class="scoreBox">${score}/100</div>

<p>${status}</p>

<div class="section">

<h2>Health Summary</h2>

<p>Your lifestyle indicators suggest <b>${status}</b>. Maintaining consistent healthy habits will significantly improve long-term health outcomes.</p>

</div>

<div class="section">

<h2>Cardiovascular Risk</h2>

<p>${cardioChance}</p>

</div>

<div class="section">

<h2>Recommended Preventive Actions</h2>

<ul>

${recommendations.map(r=>`<li>${r}</li>`).join("")}

</ul>

</div>

<div class="section">

<h2>World-Class 30-Day Fitness Program</h2>

${fitnessPlan}

</div>

<div class="disclaimer">

<b>Medical Disclaimer</b>

<p>This report is a digitally generated health assessment created based on the information provided by the user and general wellness guidelines. It is intended for informational purposes only and should not be considered medical advice. Always consult a qualified healthcare professional before making health decisions.</p>

</div>

<button onclick="downloadPDF()">Download Full Report</button>

`;

}


function generate30DayProgram(score){

let beginner=[
"Walk 5000 steps",
"10 minute stretching",
"Drink 3 liters of water",
"10 minute meditation",
"15 squats",
"Light yoga session",
"Sleep 8 hours"
];

let intermediate=[
"Walk 8000 steps",
"20 minute cardio",
"15 minute strength training",
"Core workout session",
"Healthy meal planning",
"20 minute cycling",
"Mindfulness meditation"
];

let advanced=[
"10000 steps challenge",
"HIIT workout 25 minutes",
"Strength training session",
"Full body stretching",
"30 minute run",
"Mobility workout",
"Advanced core training"
];

let plan="";
let activities;

if(score<60) activities=beginner;
else if(score<80) activities=intermediate;
else activities=advanced;

for(let i=1;i<=30;i++){

let act=activities[Math.floor(Math.random()*activities.length)];

plan+=`<div class="programDay"><b>Day ${i}</b> — ${act}</div>`;

}

return plan;

}


async function downloadPDF(){

const {jsPDF}=window.jspdf;

let report=document.getElementById("report");

html2canvas(report).then(canvas=>{

let img=canvas.toDataURL("image/png");

let pdf=new jsPDF("p","mm","a4");

pdf.addImage(img,"PNG",10,10,190,0);

pdf.save("Health_Report.pdf");

});

}

</script>

</body>

</html>
