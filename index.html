<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Clinical Health Intelligence Platform</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:Inter;
background:#f4f7fb;
}

header{
background:linear-gradient(90deg,#0f172a,#2563eb);
color:white;
padding:22px;
text-align:center;
font-size:24px;
font-weight:700;
}

.container{
max-width:1100px;
margin:auto;
padding:25px;
}

.card{
background:white;
padding:22px;
border-radius:10px;
box-shadow:0 10px 20px rgba(0,0,0,0.08);
margin-bottom:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:12px;
}

input{
padding:10px;
border:1px solid #cbd5e1;
border-radius:6px;
}

button{
background:#2563eb;
color:white;
border:none;
padding:12px 18px;
border-radius:8px;
margin-top:15px;
cursor:pointer;
}

.metricGrid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(170px,1fr));
gap:15px;
margin-top:15px;
}

.metric{
background:#eef2ff;
padding:15px;
border-radius:8px;
text-align:center;
}

.metricValue{
font-size:26px;
font-weight:700;
color:#1e3a8a;
}

.sectionTitle{
margin-top:20px;
font-size:18px;
font-weight:600;
color:#0f172a;
}

.programDay{
background:#ecfdf5;
padding:8px;
margin:5px 0;
border-left:4px solid #10b981;
font-size:13px;
}

</style>
</head>

<body>

<header>Clinical Preventive Health Intelligence System</header>

<div class="container">

<div class="card">

<h2>Patient Assessment</h2>

<div class="grid">

<input id="name" placeholder="Full Name">
<input id="age" placeholder="Age">
<input id="height" placeholder="Height (cm)">
<input id="weight" placeholder="Weight (kg)">
<input id="waist" placeholder="Waist (cm)">
<input id="steps" placeholder="Daily Steps">
<input id="sleep" placeholder="Sleep Hours">
<input id="stress" placeholder="Stress (1-10)">
<input id="water" placeholder="Water (L)">
<input id="restHR" placeholder="Resting HR">

</div>

<button onclick="analyze()">Analyze Health</button>

</div>

<div id="report" class="card" style="display:none"></div>

</div>

<script>

function analyze(){

let name=document.getElementById("name").value
let age=+document.getElementById("age").value
let height=+document.getElementById("height").value/100
let weight=+document.getElementById("weight").value
let waist=+document.getElementById("waist").value
let steps=+document.getElementById("steps").value
let sleep=+document.getElementById("sleep").value
let stress=+document.getElementById("stress").value
let water=+document.getElementById("water").value
let hr=+document.getElementById("restHR").value

if(!name||!age||!height||!weight){
alert("Fill required fields")
return
}

//// GLOBAL STANDARD CALCULATIONS

let bmi = weight/(height*height)

// Deurenberg Body Fat
let bodyFat = (1.20*bmi)+(0.23*age)-16.2

let fatMass = weight*(bodyFat/100)
let leanMass = weight-fatMass

let waistHeightRatio = waist/(height*100)

// Mifflin St Jeor BMR
let bmr = (10*weight)+(6.25*(height*100))-(5*age)+5

let tdee = bmr*1.375

// MACROS
let protein = weight*1.8
let fat = (tdee*0.25)/9
let carbs = (tdee-(protein*4 + fat*9))/4

// HEALTH SCORE
let score=100
if(bmi>25)score-=10
if(steps<6000)score-=10
if(sleep<6)score-=10
if(stress>7)score-=10
if(water<2)score-=5

score=Math.max(0,score)

let program = generate30Day()

document.getElementById("report").style.display="block"

document.getElementById("report").innerHTML=`

<h2>Executive Health Report</h2>

<b>Patient:</b> ${name}

<div class="sectionTitle">Body Composition (Global Standard)</div>

<div class="metricGrid">

<div class="metric"><div class="metricValue">${bmi.toFixed(1)}</div>BMI</div>
<div class="metric"><div class="metricValue">${bodyFat.toFixed(1)}%</div>Body Fat</div>
<div class="metric"><div class="metricValue">${leanMass.toFixed(1)}</div>Lean Mass</div>
<div class="metric"><div class="metricValue">${fatMass.toFixed(1)}</div>Fat Mass</div>

</div>

<div class="sectionTitle">Metabolic Health (Calculator Standard)</div>

<div class="metricGrid">

<div class="metric"><div class="metricValue">${bmr.toFixed(0)}</div>BMR</div>
<div class="metric"><div class="metricValue">${tdee.toFixed(0)}</div>TDEE</div>
<div class="metric"><div class="metricValue">${waistHeightRatio.toFixed(2)}</div>WHtR</div>
<div class="metric"><div class="metricValue">${score}</div>Health Score</div>

</div>

<div class="sectionTitle">Nutrition (Macro Breakdown)</div>

<div class="metricGrid">

<div class="metric"><div class="metricValue">${protein.toFixed(0)}g</div>Protein</div>
<div class="metric"><div class="metricValue">${fat.toFixed(0)}g</div>Fat</div>
<div class="metric"><div class="metricValue">${carbs.toFixed(0)}g</div>Carbs</div>

</div>

<div class="sectionTitle">Clinical Interpretation</div>

<p>
This assessment follows standardized formulas used in global fitness calculators including BMI,
Mifflin-St Jeor BMR, Deurenberg Body Fat estimation and TDEE energy modeling.
The results represent metabolic health, energy balance, and nutritional requirements.
</p>

<div class="sectionTitle">30-Day Adaptive Fitness Program</div>

${program}

`

}

function generate30Day(){

let base=[
"Brisk walking 30 min",
"Mobility & stretching",
"Bodyweight strength",
"Core stability training",
"Cycling endurance",
"Yoga recovery",
"Breathing meditation"
]

let out=""
for(let i=0;i<30;i++){
out+=`<div class="programDay">Day ${i+1}: ${base[i%7]}</div>`
}
return out
}

</script>

</body>
</html>
